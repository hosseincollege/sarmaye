{% load static %}

<h2>{{ form_title }}</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% for field in form %}
        <div>
            <label>{{ field.label }}</label>
            {{ field }}
        </div>
    {% endfor %}
    <button type="submit">ذخیره</button>
</form>


<a href="{% url 'dashboard' %}">بازگشت</a>
