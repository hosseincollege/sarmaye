<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>مدیریت کارگاه‌ها</title>

    <!-- اگر فونت فارسی محلی داری، آدرسش را اینجا بگذار -->
    <style>
        :root {
            --main-font: "Vazir", "Tahoma", "Segoe UI", sans-serif;
        }
        html, body {
            direction: rtl;
            text-align: right;
            font-family: var(--main-font);
            margin: 0;
            padding: 0;
            background: #fff;
            color: #222;
            line-height: 1.6;
        }

        header {
            padding: 12px 20px;
            background: #f5f5f5;
            border-bottom: 1px solid #e0e0e0;
        }

        nav a {
            margin-left: 12px; /* چون راست‌چین است، فاصله از سمت چپ می‌آید */
            color: #0366d6;
            text-decoration: none;
        }

        main {
            max-width: 1000px;
            margin: 20px auto;
            padding: 16px;
        }

        .container {
            direction: rtl;
            text-align: right;
        }

        /* فرم‌ها */
        form {
            display: block;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input[type="text"],
        input[type="file"],
        textarea,
        select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
            text-align: right;
        }

        button, a.button-link {
            display: inline-block;
            padding: 8px 14px;
            margin-top: 8px;
            background: #1976d2;
            color: white;
            border-radius: 4px;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }

        .secondary {
            background: #e0e0e0;
            color: #111;
        }

        .field-row {
            margin-bottom: 12px;
        }

        .files-list {
            margin-top: 8px;
            padding-right: 8px;
            list-style: none;
        }

        .files-list li::before {
            content: "📄 ";
            margin-left: 6px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'logout' %}">خروج</a> |
            <a href="{% url 'workshop_create' %}">ایجاد کارگاه جدید</a> |
            <a href="/admin/">ورود به مدیریت ادمین</a> |
            <a href="{% url 'dashboard' %}">داشبورد</a>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
